<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" font-family="sans-serif">
  <title>G-Load on a Mass</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
  </defs>
  <!-- mass block -->
  <rect x="110" y="70" width="100" height="70" rx="6" fill="#dfe7f0" stroke="#34495e" stroke-width="2"/>
  <text x="160" y="112" text-anchor="middle" font-size="22" fill="#2c3e50">m</text>
  <!-- acceleration arrow (n*g) -->
  <line x1="160" y1="150" x2="160" y2="205" stroke="#c0392b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="172" y="190" font-size="16" fill="#c0392b">a = n·g</text>
  <!-- resultant force arrow -->
  <line x1="240" y1="105" x2="300" y2="105" stroke="#c0392b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="252" y="96" font-size="16" fill="#c0392b">F = m·n·g</text>
  <text x="160" y="30" text-anchor="middle" font-size="15" fill="#7f8c8d">Inertial force on a mass at n·g</text>
</svg>
