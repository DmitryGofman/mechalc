<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" font-family="sans-serif">
  <title>Pin in Single Shear</title>
  <defs>
    <marker id="sR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="sL" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#c0392b"/>
    </marker>
  </defs>
  <!-- upper plate (pulled right) -->
  <rect x="160" y="60" width="170" height="30" fill="#dfe7f0" stroke="#34495e" stroke-width="2"/>
  <line x1="330" y1="75" x2="350" y2="75" stroke="#c0392b" stroke-width="3" marker-end="url(#sR)"/>
  <text x="345" y="58" font-size="16" fill="#c0392b">F</text>
  <!-- lower plate (pulled left) -->
  <rect x="30" y="90" width="170" height="30" fill="#c9d6e5" stroke="#34495e" stroke-width="2"/>
  <line x1="30" y1="105" x2="10" y2="105" stroke="#c0392b" stroke-width="3" marker-end="url(#sL)"/>
  <text x="14" y="132" font-size="16" fill="#c0392b">F</text>
  <!-- pin through both -->
  <rect x="170" y="52" width="20" height="76" rx="4" fill="#95a5a6" stroke="#2c3e50" stroke-width="2"/>
  <!-- shear plane -->
  <line x1="160" y1="90" x2="200" y2="90" stroke="#c0392b" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="205" y="94" font-size="13" fill="#c0392b">shear plane (1×A)</text>
  <text x="180" y="175" text-anchor="middle" font-size="16" fill="#2c3e50">τ = F / A</text>
</svg>
