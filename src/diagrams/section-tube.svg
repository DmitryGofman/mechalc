<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 250" font-family="sans-serif">
  <title>Hollow Tube Section</title>
  <defs>
    <marker id="td" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,4 L8,0 L8,8 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <circle cx="130" cy="100" r="62" fill="#dfe7f0" stroke="#34495e" stroke-width="2"/>
  <circle cx="130" cy="100" r="36" fill="#ffffff" stroke="#34495e" stroke-width="2"/>
  <!-- outer diameter -->
  <line x1="68" y1="100" x2="192" y2="100" stroke="#7f8c8d" marker-start="url(#td)" marker-end="url(#td)"/>
  <text x="160" y="93" font-size="14" fill="#7f8c8d">do</text>
  <!-- inner diameter -->
  <line x1="94" y1="125" x2="166" y2="125" stroke="#2980b9" marker-start="url(#td)" marker-end="url(#td)"/>
  <text x="130" y="140" text-anchor="middle" font-size="13" fill="#2980b9">di</text>
  <text x="130" y="210" text-anchor="middle" font-size="13" fill="#2c3e50">I = π(do⁴ − di⁴)/64</text>
  <text x="130" y="232" text-anchor="middle" font-size="13" fill="#2c3e50">J = 2·I</text>
</svg>
