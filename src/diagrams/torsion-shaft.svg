<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" font-family="sans-serif">
  <title>Torsion in a Circular Shaft</title>
  <defs>
    <marker id="tarrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <pattern id="hatch3" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#34495e" stroke-width="1.5"/>
    </pattern>
  </defs>
  <!-- fixed wall -->
  <rect x="26" y="55" width="14" height="90" fill="url(#hatch3)" stroke="#34495e"/>
  <line x1="40" y1="55" x2="40" y2="145" stroke="#34495e" stroke-width="2"/>
  <!-- shaft body -->
  <rect x="40" y="80" width="250" height="40" fill="#dfe7f0" stroke="#34495e" stroke-width="2"/>
  <!-- end face circle -->
  <ellipse cx="290" cy="100" rx="14" ry="20" fill="#c9d6e5" stroke="#34495e" stroke-width="2"/>
  <!-- radius r -->
  <line x1="290" y1="100" x2="290" y2="80" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="296" y="78" font-size="15" fill="#2c3e50">r</text>
  <!-- applied torque T (curved arrow) -->
  <path d="M310,75 A28,28 0 1 1 308,125" fill="none" stroke="#c0392b" stroke-width="3" marker-end="url(#tarrow)"/>
  <text x="330" y="105" font-size="18" fill="#c0392b">T</text>
  <!-- formula -->
  <text x="150" y="165" text-anchor="middle" font-size="16" fill="#2c3e50">τ = T·r / J</text>
  <text x="150" y="45" text-anchor="middle" font-size="14" fill="#7f8c8d">J = π·d⁴/32 (solid)</text>
</svg>
