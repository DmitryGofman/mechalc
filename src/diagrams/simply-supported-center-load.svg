<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 230" font-family="sans-serif">
  <title>Simply Supported Beam with Center Load</title>
  <defs>
    <marker id="arrowDc" markerWidth="10" markerHeight="10" refX="3" refY="8" orient="auto">
      <path d="M0,0 L6,0 L3,8 Z" fill="#c0392b"/>
    </marker>
    <marker id="dimc" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,4 L8,0 L8,8 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <!-- beam -->
  <rect x="50" y="90" width="280" height="14" fill="#dfe7f0" stroke="#34495e" stroke-width="2"/>
  <text x="190" y="82" text-anchor="middle" font-size="14" fill="#2c3e50">I (section)</text>
  <!-- left pin support (triangle) -->
  <path d="M50,104 L38,126 L62,126 Z" fill="#fff" stroke="#34495e" stroke-width="2"/>
  <line x1="34" y1="130" x2="66" y2="130" stroke="#34495e" stroke-width="2"/>
  <!-- right roller support -->
  <path d="M330,104 L318,126 L342,126 Z" fill="#fff" stroke="#34495e" stroke-width="2"/>
  <circle cx="324" cy="132" r="4" fill="#fff" stroke="#34495e" stroke-width="1.5"/>
  <circle cx="336" cy="132" r="4" fill="#fff" stroke="#34495e" stroke-width="1.5"/>
  <line x1="316" y1="140" x2="344" y2="140" stroke="#34495e" stroke-width="2"/>
  <!-- center load P -->
  <line x1="190" y1="40" x2="190" y2="86" stroke="#c0392b" stroke-width="3" marker-end="url(#arrowDc)"/>
  <text x="200" y="56" font-size="18" fill="#c0392b">P</text>
  <!-- deflected shape -->
  <path d="M50,104 Q190,150 330,104" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="196" y="170" font-size="16" fill="#2980b9">δ = P·L³ / 48EI</text>
  <!-- span L -->
  <line x1="50" y1="200" x2="330" y2="200" stroke="#7f8c8d" stroke-width="1" marker-start="url(#dimc)" marker-end="url(#dimc)"/>
  <text x="190" y="218" text-anchor="middle" font-size="16" fill="#7f8c8d">L  (M = P·L / 4 at center)</text>
</svg>
