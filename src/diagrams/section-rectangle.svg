<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" font-family="sans-serif">
  <title>Rectangular Section</title>
  <defs>
    <marker id="rd" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,4 L8,0 L8,8 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <rect x="80" y="50" width="100" height="120" fill="#dfe7f0" stroke="#34495e" stroke-width="2"/>
  <!-- neutral axis -->
  <line x1="60" y1="110" x2="200" y2="110" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="204" y="114" font-size="12" fill="#2980b9">NA</text>
  <!-- b dimension -->
  <line x1="80" y1="190" x2="180" y2="190" stroke="#7f8c8d" marker-start="url(#rd)" marker-end="url(#rd)"/>
  <text x="130" y="208" text-anchor="middle" font-size="16" fill="#7f8c8d">b</text>
  <!-- h dimension -->
  <line x1="50" y1="50" x2="50" y2="170" stroke="#7f8c8d" marker-start="url(#rd)" marker-end="url(#rd)"/>
  <text x="38" y="114" text-anchor="middle" font-size="16" fill="#7f8c8d">h</text>
  <text x="130" y="232" text-anchor="middle" font-size="13" fill="#2c3e50">I = b·h³/12   Z = b·h²/6</text>
</svg>
