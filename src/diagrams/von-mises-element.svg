<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" font-family="sans-serif">
  <title>Combined Stress Element (Von Mises)</title>
  <defs>
    <marker id="vm" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="vmt" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2980b9"/>
    </marker>
  </defs>
  <!-- stress element square -->
  <rect x="110" y="80" width="90" height="90" fill="#eef3f8" stroke="#34495e" stroke-width="2"/>
  <!-- normal stress sigma (left/right) -->
  <line x1="100" y1="125" x2="60" y2="125" stroke="#c0392b" stroke-width="3" marker-end="url(#vm)"/>
  <line x1="210" y1="125" x2="250" y2="125" stroke="#c0392b" stroke-width="3" marker-end="url(#vm)"/>
  <text x="40" y="120" font-size="16" fill="#c0392b">σ</text>
  <text x="258" y="120" font-size="16" fill="#c0392b">σ</text>
  <!-- shear stress tau (top/bottom) -->
  <line x1="120" y1="72" x2="190" y2="72" stroke="#2980b9" stroke-width="3" marker-end="url(#vmt)"/>
  <line x1="190" y1="178" x2="120" y2="178" stroke="#2980b9" stroke-width="3" marker-end="url(#vmt)"/>
  <text x="150" y="64" text-anchor="middle" font-size="16" fill="#2980b9">τ</text>
  <text x="150" y="196" text-anchor="middle" font-size="16" fill="#2980b9">τ</text>
  <!-- formula -->
  <text x="160" y="228" text-anchor="middle" font-size="16" fill="#2c3e50">σ_vm = √(σ² + 3τ²)</text>
  <text x="160" y="34" text-anchor="middle" font-size="14" fill="#7f8c8d">Combined normal + shear</text>
</svg>
