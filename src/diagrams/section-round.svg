<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" font-family="sans-serif">
  <title>Solid Round Section</title>
  <defs>
    <marker id="cd" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,4 L8,0 L8,8 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <circle cx="130" cy="105" r="60" fill="#dfe7f0" stroke="#34495e" stroke-width="2"/>
  <!-- diameter line -->
  <line x1="70" y1="105" x2="190" y2="105" stroke="#7f8c8d" marker-start="url(#cd)" marker-end="url(#cd)"/>
  <text x="130" y="98" text-anchor="middle" font-size="16" fill="#7f8c8d">d</text>
  <line x1="60" y1="105" x2="200" y2="105" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="204" y="109" font-size="12" fill="#2980b9">NA</text>
  <text x="130" y="205" text-anchor="middle" font-size="13" fill="#2c3e50">I = π·d⁴/64</text>
  <text x="130" y="226" text-anchor="middle" font-size="13" fill="#2c3e50">J = π·d⁴/32   Z = π·d³/32</text>
</svg>
