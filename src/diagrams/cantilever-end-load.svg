<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 240" font-family="sans-serif">
  <title>Cantilever Beam with End Load</title>
  <defs>
    <marker id="arrowD" markerWidth="10" markerHeight="10" refX="3" refY="8" orient="auto">
      <path d="M0,0 L6,0 L3,8 Z" fill="#c0392b"/>
    </marker>
    <marker id="dim" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,4 L8,0 L8,8 Z" fill="#7f8c8d"/>
    </marker>
    <pattern id="hatch2" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#34495e" stroke-width="1.5"/>
    </pattern>
  </defs>
  <!-- fixed wall -->
  <rect x="26" y="50" width="14" height="90" fill="url(#hatch2)" stroke="#34495e"/>
  <line x1="40" y1="50" x2="40" y2="140" stroke="#34495e" stroke-width="2"/>
  <text x="20" y="160" font-size="14" fill="#2c3e50">M = P·L</text>
  <!-- beam (undeflected) -->
  <rect x="40" y="88" width="280" height="14" fill="#dfe7f0" stroke="#34495e" stroke-width="2"/>
  <text x="180" y="80" text-anchor="middle" font-size="14" fill="#2c3e50">I (section)</text>
  <!-- deflected shape -->
  <path d="M40,95 Q200,100 320,150" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="300" y="175" font-size="16" fill="#2980b9">δ</text>
  <line x1="320" y1="102" x2="320" y2="150" stroke="#2980b9" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- end load P -->
  <line x1="320" y1="40" x2="320" y2="92" stroke="#c0392b" stroke-width="3" marker-end="url(#arrowD)"/>
  <text x="330" y="55" font-size="18" fill="#c0392b">P</text>
  <!-- length dim L -->
  <line x1="40" y1="210" x2="320" y2="210" stroke="#7f8c8d" stroke-width="1" marker-start="url(#dim)" marker-end="url(#dim)"/>
  <text x="180" y="228" text-anchor="middle" font-size="16" fill="#7f8c8d">L</text>
</svg>
