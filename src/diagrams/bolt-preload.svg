<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 230" font-family="sans-serif">
  <title>Bolt Preload / Torque</title>
  <defs>
    <marker id="bt" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <pattern id="bhatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#7f8c8d" stroke-width="1.2"/>
    </pattern>
  </defs>
  <!-- clamped plates -->
  <rect x="70" y="90" width="150" height="26" fill="#dfe7f0" stroke="#34495e" stroke-width="2"/>
  <rect x="70" y="116" width="150" height="26" fill="#c9d6e5" stroke="#34495e" stroke-width="2"/>
  <!-- bolt head -->
  <rect x="120" y="58" width="50" height="20" fill="#95a5a6" stroke="#2c3e50" stroke-width="2"/>
  <!-- shank -->
  <rect x="132" y="78" width="26" height="74" fill="#95a5a6" stroke="#2c3e50" stroke-width="2"/>
  <!-- nut -->
  <rect x="118" y="152" width="54" height="20" fill="#95a5a6" stroke="#2c3e50" stroke-width="2"/>
  <!-- torque arrow -->
  <path d="M178,58 A24,24 0 0 1 200,80" fill="none" stroke="#c0392b" stroke-width="3" marker-end="url(#bt)"/>
  <text x="205" y="60" font-size="16" fill="#c0392b">T = K·F·d</text>
  <!-- preload force arrows -->
  <line x1="145" y1="56" x2="145" y2="30" stroke="#27ae60" stroke-width="3" marker-end="url(#bt)"/>
  <line x1="145" y1="174" x2="145" y2="200" stroke="#27ae60" stroke-width="3" marker-end="url(#bt)"/>
  <text x="155" y="28" font-size="15" fill="#27ae60">F (preload)</text>
  <text x="160" y="135" font-size="14" fill="#2c3e50">σ = F / At</text>
  <text x="160" y="222" text-anchor="middle" font-size="13" fill="#7f8c8d">d = nominal Ø,  At = tensile area</text>
</svg>
