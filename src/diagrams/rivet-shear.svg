<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" font-family="sans-serif">
  <title>Rivet Shear and Bearing</title>
  <defs>
    <marker id="rvR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="rvL" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="rvd" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,4 L8,0 L8,8 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
  <!-- top plate pulled right -->
  <rect x="160" y="64" width="170" height="28" fill="#dfe7f0" stroke="#34495e" stroke-width="2"/>
  <line x1="330" y1="78" x2="352" y2="78" stroke="#c0392b" stroke-width="3" marker-end="url(#rvR)"/>
  <text x="338" y="60" font-size="15" fill="#c0392b">F</text>
  <!-- bottom plate pulled left -->
  <rect x="30" y="92" width="170" height="28" fill="#c9d6e5" stroke="#34495e" stroke-width="2"/>
  <line x1="30" y1="106" x2="8" y2="106" stroke="#c0392b" stroke-width="3" marker-end="url(#rvL)"/>
  <text x="14" y="135" font-size="15" fill="#c0392b">F</text>
  <!-- rivet with rounded heads -->
  <rect x="170" y="64" width="22" height="56" fill="#95a5a6" stroke="#2c3e50" stroke-width="2"/>
  <ellipse cx="181" cy="64" rx="16" ry="6" fill="#95a5a6" stroke="#2c3e50" stroke-width="2"/>
  <ellipse cx="181" cy="120" rx="16" ry="6" fill="#95a5a6" stroke="#2c3e50" stroke-width="2"/>
  <!-- shear plane -->
  <line x1="160" y1="92" x2="200" y2="92" stroke="#c0392b" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- diameter d -->
  <line x1="170" y1="150" x2="192" y2="150" stroke="#7f8c8d" marker-start="url(#rvd)" marker-end="url(#rvd)"/>
  <text x="181" y="166" text-anchor="middle" font-size="13" fill="#7f8c8d">d</text>
  <text x="265" y="160" text-anchor="middle" font-size="13" fill="#2c3e50">τ = F/A</text>
  <text x="265" y="178" text-anchor="middle" font-size="13" fill="#2c3e50">σ_bearing = F/(d·t)</text>
</svg>
